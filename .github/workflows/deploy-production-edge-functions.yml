name: deploy production edge functions

on:
  workflow_dispatch:
    inputs:
      function_name:
        description: Function to deploy
        type: choice
        required: true
        options:
          - ops-api
          - send-quote
      approval_phrase:
        description: Type exactly "approve secureworks production edge deploy"
        type: string
        required: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Human approval phrase
        run: |
          if [ "${{ inputs.approval_phrase }}" != "approve secureworks production edge deploy" ]; then
            echo "Refusing production edge deploy: approval phrase did not match." >&2
            exit 1
          fi

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Guardrails
        run: scripts/check-edge-deploy-guardrails.sh

      - name: Deploy from canonical GitHub lane
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SW_API_KEY: ${{ secrets.SW_API_KEY }}
          CANONICAL_RELEASE_ROOT: ${{ github.workspace }}
          SUPABASE_CLI: supabase
          CI: 'true'
        run: scripts/deploy-edge-function.sh "${{ inputs.function_name }}"
